theme = "stylix"
[editor]
cursorcolumn = true
cursorline = true
line-number = "relative"
[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.indent-guides]
render = true
skip-levels = 1

[editor.lsp]
display-messages = true

[editor.soft-wrap]
enable = true
max-indent-retain = 0
max-wrap = 80
wrap-indicator = ""

[editor.whitespace]
render = "all"
[editor.whitespace.characters]
nbsp = "⍽"
newline = "⏎"
space = "·"
tab = "→"
tabpad = "·"

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]

[keys.normal.space]
l = "switch_to_lowercase"
space = ":w"
u = "switch_to_uppercase"
