theme = "gruvbox_light"
[editor]
bufferline = "multiple"
cursorcolumn = true
cursorline = true
line-number = "relative"
[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.indent-guides]
render = true
skip-levels = 1

[editor.lsp]
display-messages = true

[editor.soft-wrap]
enable = true
max-indent-retain = 0
max-wrap = 80
wrap-indicator = ""

[editor.whitespace]
tab = "all"
newline = "all"
[editor.whitespace.characters]
nbsp = "⍽"
newline = "⏎"
space = "·"
tab = "→"
tabpad = "·"

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
o = ["open_below", "normal_mode"]
O = ["open_above", "normal_mode"]
# In Neovim
# map("n", "o", "o <BS><esc>")
# map("n", "O", "O <BS><esc>")
M = "repeat_last_motion"

[keys.normal.space]
space = ":w"
c = ":bc"
q = ":q"
l = "switch_to_lowercase"
u = "switch_to_uppercase"
