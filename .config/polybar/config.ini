[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880
white = #fff
black = #000
yellow = #ffff00

[bar/xmonad]
width = 100%
height = 21pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 1pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = Noto Sans CJK JP:size=11:style=Bold;3
font-1 = FontAwesome 5 Free Solid:size=12;2
font-2 = monospace:size=10;2

modules-left = filesystem alsa memory cpu eth date
modules-center = xworkspaces 
modules-right = wlan backlight battery

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-padding = 3

bottom = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %icon%
; label-active-background = ${colors.background-alt}
label-active-foreground = ${colors.yellow}
; label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %icon%
label-occupied-padding = 1
label-occupied-foreground = ${colors.white}

label-urgent = %icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %icon%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

icon-0 = 1;  A
icon-1 = 2;  B
icon-2 = 3;  C
icon-3 = 4;  D
icon-4 = 5;  E
icon-5 = 6;  F
icon-6 = 7;  G
icon-7 = 8;  H
icon-8 = 9;  I

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} Ôā† %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
 
[module/alsa]
type = internal/alsa

format-volume = <ramp-volume> <label-volume>
format-volume-background = ${color.shade6}
format-volume-foreground = ${color.modulefg}
format-volume-padding = 2

label-volume = %percentage%%

format-muted-prefix = Ôö©
label-muted = " muted"
format-muted-background = ${color.shade6}
format-muted-foreground = ${color.modulefg}
format-muted-padding = 2

ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = ""
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = ÔÄ® %percentage%

label-muted = Ôö© muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = ÔĄú  %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}
 
[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÔĒł "
format-prefix-foreground = ${colors.foreground-alt}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.foreground-alt}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} Ôźź

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = Ôáę  | ÔĀ£ %downspeed% | ÔĀĘ %upspeed%
label-disconnected = ÔĀ≤

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %a %d
date-alt = %d/%m/%y

time = %H:%M
time-alt = %H:%M

label = %{F#87ceeb} ÔĀ≥%{F#ffffff} %date% %{F#87ceeb}  ÔÄó %{F#ffffff} %time%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini

; ============================================================================

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 100

format-charging = <animation-charging> <label-charging>

format-discharging = <label-discharging>

animation-charging-0 = ÔČÉ
animation-charging-1 = ÔČā
animation-charging-2 = ÔČĀ
animation-charging-3 = ÔČÄ
animation-charging-foreground = #66ff00
animation-charging-framerate = 750

animation-discharging-0 = ÔČÄ
animation-discharging-1 = ÔČĀ
animation-discharging-2 = ÔČā
animation-discharging-3 = ÔČÉ
animation-discharging-4 = ÔČĄ
animation-discharging-framerate = 750
label-charging = %percentage%
label-discharging = %{F#ffff00} ÔČā %{F#ffffff} %percentage%
label-full = ÔČÄ %percentage%
label-full-foreground = #66ff00 
